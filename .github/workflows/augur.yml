name: Augur Signal Intelligence

concurrency:
  group: augur-pipeline
  cancel-in-progress: false

on:
  schedule:
    # 每日完整分析：UTC 17:00 (北京时间 01:00)
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  daily-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmmirror.com

      - name: Run full pipeline (collect + analyze + predict + evolve + report)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: npx tsx src/cli.ts run --weekly

      - name: Commit data and report
        run: |
          git config user.name "augur-bot"
          git config user.email "augur-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/ reports/
          git diff --staged --quiet || git commit -m "report: daily analysis $(date +%Y-%m-%d)"
          git push

      - name: Publish report as GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create daily-report --color 0E8A16 --description "Augur 信号日报" 2>/dev/null || true
          LATEST_REPORT=$(ls -t reports/*.md 2>/dev/null | head -1)
          if [ -n "$LATEST_REPORT" ]; then
            TITLE=$(head -1 "$LATEST_REPORT" | sed 's/^# //')
            gh issue create \
              --title "$TITLE" \
              --label "daily-report" \
              --body-file "$LATEST_REPORT"
          fi
